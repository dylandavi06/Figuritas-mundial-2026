<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hoja de Figuritas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        @page {
            size: A4;
            margin: 10mm;
        }
        
        body {
            font-family: 'Roboto', sans-serif;
            width: 210mm;
            height: 297mm;
        }
        
        .sheet {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 2.5mm;
            height: 100%;
            padding: 10mm;
        }
        
        .figurita-slot {
            width: 50mm;
            height: 70mm;
            border: 1px solid #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f9f9f9;
        }
        
        .figurita-slot img {
            max-width: 100%;
            max-height: 100%;
            object-fit: cover;
        }
        
        .empty {
            background: #f0f0f0;
            color: #ccc;
            font-size: 12pt;
        }
    </style>
</head>
<body>
    <div class="sheet">
        {% for fig in figuritas %}
        <div class="figurita-slot">
            {% if fig.imagen_path %}
                <img src="{{ fig.imagen_path }}" alt="{{ fig.nombre }}">
            {% else %}
                <div class="empty">-</div>
            {% endif %}
        </div>
        {% endfor %}
    </div>
</body>
</html>
